project_name: pgkernel

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: pgkernel
    main: ./cmd/pgkernel
    binary: pgkernel
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
